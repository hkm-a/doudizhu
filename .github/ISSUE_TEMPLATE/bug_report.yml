name: Bug report
description: Report a reproducible problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact commands or in-app actions.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Ubuntu 22.04, Windows 11, macOS 15
    validations:
      required: true
  - type: textarea
    id: versions
    attributes:
      label: Runtime versions
      description: Python, Node, npm, Rust, MySQL and Tauri versions if relevant.
      render: text
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Remove secrets before posting.
      render: text
