name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  hygiene:
    name: Repository hygiene
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Validate verification script
        run: node --check scripts/verify.mjs

      - name: Validate configuration script
        run: node --check scripts/verify-config.mjs

      - name: Validate development setup script
        run: node --check scripts/setup-dev.mjs

      - name: Validate development doctor script
        run: node --check scripts/doctor-dev.mjs

      - name: Run configuration checks
        run: npm run verify:config

      - name: Run repository hygiene checks
        run: npm run verify:format

  backend:
    name: Backend checks
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile backend
        run: python -m compileall -q server

      - name: Run backend smoke checks
        env:
          PYTHONPATH: server
        run: python scripts/backend-smoke.py

      - name: Run backend unit tests
        env:
          PYTHONPATH: server
        run: python -m unittest discover -s tests/backend -p 'test_*.py'

  web:
    name: Web build
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Build web client
        run: npm run build

  desktop:
    name: Desktop Rust tests
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install desktop dependencies
        run: npm ci

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml
