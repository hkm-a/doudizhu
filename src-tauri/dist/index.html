<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>欢乐斗地主</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #101418;
        color: #f7f3e8;
      }

      body {
        align-items: center;
        display: flex;
        height: 100vh;
        justify-content: center;
        margin: 0;
        overflow: hidden;
      }

      main {
        display: grid;
        gap: 1rem;
        max-width: 34rem;
        padding: 2rem;
        text-align: center;
      }

      .mark {
        align-items: center;
        background: #d84032;
        border: 3px solid #f7f3e8;
        box-shadow: 0 18px 40px rgb(0 0 0 / 0.26);
        display: inline-flex;
        height: 4.5rem;
        justify-content: center;
        justify-self: center;
        transform: rotate(45deg);
        width: 4.5rem;
      }

      .mark span {
        color: #fff4cf;
        font-size: 2rem;
        font-weight: 800;
        transform: rotate(-45deg);
      }

      h1 {
        font-size: 1.7rem;
        font-weight: 650;
        letter-spacing: 0;
        margin: 0;
      }

      p {
        color: #cfc7b8;
        line-height: 1.7;
        margin: 0;
      }

      .status {
        align-items: center;
        color: #d8d2c6;
        display: flex;
        gap: 0.65rem;
        justify-content: center;
        min-height: 1.5rem;
      }

      .dot {
        animation: pulse 1.1s ease-in-out infinite;
        background: #39b980;
        border-radius: 999px;
        height: 0.65rem;
        width: 0.65rem;
      }

      .status[data-state="error"] .dot {
        animation: none;
        background: #ffbc42;
      }

      .hint {
        color: #9fa8ae;
        font-size: 0.9rem;
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.45; transform: scale(0.88); }
        50% { opacity: 1; transform: scale(1.08); }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true"><span>斗</span></div>
      <h1>欢乐斗地主</h1>
      <p>正在准备本地牌桌服务，稍等片刻就能开局。</p>
      <div class="status" id="status" data-state="ready">
        <span class="dot"></span>
        <span id="message">正在启动...</span>
      </div>
      <p class="hint">如果长时间停留，请确认 MySQL 和 Python 依赖已经安装。</p>
    </main>
    <script>
      const statusEl = document.getElementById('status');
      const messageEl = document.getElementById('message');

      window.__setStartupState = ({ state, message }) => {
        statusEl.dataset.state = state || 'ready';
        messageEl.textContent = message || '正在启动...';
      };
    </script>
  </body>
</html>
